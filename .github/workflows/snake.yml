name: 🐍 Snake Animation

on:
  # Запускается каждый день в 06:00 UTC · Runs every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Можно запустить вручную из Actions · Can be triggered manually
  workflow_dispatch:
  # Или при каждом push в main · Or on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate snake SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate light + dark snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}